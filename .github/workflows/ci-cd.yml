name: BizOPD CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  audit-and-build:
    name: Test, Check, and Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_DB: test_bizopd_db
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-history 3

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Set Environment Mock Variables
        run: |
          echo "DATABASE_URL=postgresql://test_user:test_password@localhost:5432/test_bizopd_db?schema=public" >> $GITHUB_ENV
          echo "REDIS_URL=redis://localhost:6379" >> $GITHUB_ENV

      - name: Validate Prisma Schema & Generate Client
        run: |
          npx prisma validate
          npx prisma generate

      - name: Run TypeScript Type Checks
        run: npx tsc --noEmit

      - name: Execute Production Build Compilation
        run: npm run build